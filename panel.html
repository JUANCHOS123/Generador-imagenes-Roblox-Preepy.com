<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BL PAPI PANEL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        /* Pantalla de login */
        .login-container {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(255, 68, 68, 0.2);
        }
        
        .login-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ff4444;
            text-align: center;
        }
        
        .login-subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: #888;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-input {
            width: 100%;
            padding: 15px;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            padding-right: 50px;
        }
        
        .password-input:focus {
            outline: none;
            border-color: #ff4444;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            cursor: pointer;
            font-size: 20px;
            user-select: none;
        }
        
        .toggle-password:hover {
            color: #ff4444;
        }
        
        .login-button {
            width: 100%;
            padding: 15px;
            background: #ff4444;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .login-button:hover {
            background: #ff6666;
        }
        
        .login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .error-message {
            color: #ff4444;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .attempts {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 15px;
        }
        
        /* Panel de control (oculto inicialmente) */
        .panel {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: none;
        }
        
        .panel.show {
            display: block;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #ff4444;
        }
        
        .header h1 {
            font-size: 32px;
            color: #fff;
        }
        
        .header h1 span {
            color: #ff4444;
        }
        
        .status {
            background: #1a1a1a;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            border-left: 4px solid #ff4444;
        }
        
        .status.connected {
            border-left-color: #00ff00;
            color: #00ff00;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
        }
        
        .card h3 {
            color: #ff4444;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #222;
        }
        
        .card.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            margin-bottom: 10px;
        }
        
        button {
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px 0;
            width: 100%;
            font-weight: bold;
        }
        
        button:hover {
            background: #ff6666;
        }
        
        button.secondary {
            background: #222;
            border: 1px solid #333;
        }
        
        button.secondary:hover {
            background: #333;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .stat {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            color: #ff4444;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 11px;
            color: #666;
        }
        
        .log {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #222;
        }
        
        .search-results {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        
        .search-item {
            padding: 10px;
            border-bottom: 1px solid #222;
            cursor: pointer;
        }
        
        .search-item:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <!-- Pantalla de login -->
    <div class="login-container" id="loginContainer">
        <div class="login-title">🔐 BL PAPI</div>
        <div class="login-subtitle">Panel de control</div>
        
        <div class="input-group">
            <label>Contraseña de acceso</label>
            <div class="password-wrapper">
                <input type="password" class="password-input" id="passwordInput" placeholder="Ingresa tu contraseña">
                <span class="toggle-password" id="togglePassword">👁️</span>
            </div>
        </div>
        
        <button class="login-button" id="loginButton">ACCEDER</button>
        
        <div class="error-message" id="errorMessage">Contraseña incorrecta</div>
        <div class="attempts" id="attempts">Intentos restantes: 5</div>
    </div>
    
    <!-- Panel de control -->
    <div class="panel" id="panel">
        <div class="header">
            <h1><span>BL PAPI</span> CONTROL</h1>
            <div class="status" id="status">⏳ Verificando cuenta...</div>
        </div>
        
        <div class="grid" id="grid">
            <!-- Se llena con JavaScript -->
        </div>
    </div>

    <script>
        // ================= CONFIGURACIÓN =================
        const PASSWORD = "BLPAPI2024"; // Cambia esto por tu contraseña
        const WEBHOOK = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        // Rate limit
        let attempts = 0;
        const maxAttempts = 5;
        let lockedUntil = 0;
        
        // Estado
        let userData = null;
        let csrfToken = null;
        
        // Elementos
        const loginContainer = document.getElementById('loginContainer');
        const panel = document.getElementById('panel');
        const passwordInput = document.getElementById('passwordInput');
        const loginButton = document.getElementById('loginButton');
        const errorMessage = document.getElementById('errorMessage');
        const attemptsDiv = document.getElementById('attempts');
        const togglePassword = document.getElementById('togglePassword');
        const grid = document.getElementById('grid');
        const statusDiv = document.getElementById('status');
        
        // =========== TOGGLE CONTRASEÑA ===========
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        });
        
        // =========== VERIFICAR CONTRASEÑA ===========
        function checkPassword() {
            const now = Date.now();
            
            if (now < lockedUntil) {
                const minutes = Math.ceil((lockedUntil - now) / 60000);
                errorMessage.textContent = `Demasiados intentos. Espera ${minutes} minutos`;
                errorMessage.classList.add('show');
                return;
            }
            
            if (passwordInput.value === PASSWORD) {
                loginContainer.style.display = 'none';
                panel.classList.add('show');
                verificarCuenta();
                enviarLogDiscord('✅ Panel accedido correctamente');
            } else {
                attempts++;
                errorMessage.classList.add('show');
                
                if (attempts >= maxAttempts) {
                    lockedUntil = now + 300000; // 5 minutos
                    attemptsDiv.textContent = '🔒 BLOQUEADO - Espera 5 minutos';
                    loginButton.disabled = true;
                    passwordInput.disabled = true;
                } else {
                    attemptsDiv.textContent = `Intentos restantes: ${maxAttempts - attempts}`;
                }
                
                setTimeout(() => errorMessage.classList.remove('show'), 2000);
            }
        }
        
        loginButton.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
        
        // =========== VERIFICAR CUENTA ROBLOX ===========
        async function verificarCuenta() {
            try {
                const res = await fetch('https://users.roblox.com/v1/users/authenticated', {
                    credentials: 'include'
                });
                
                if (res.ok) {
                    const data = await res.json();
                    userData = data;
                    statusDiv.innerHTML = `✅ CONECTADO - ${data.name}`;
                    statusDiv.classList.add('connected');
                    
                    // Obtener CSRF
                    const csrfRes = await fetch('https://auth.roblox.com/v2/logout', {
                        method: 'POST',
                        credentials: 'include'
                    });
                    csrfToken = csrfRes.headers.get('x-csrf-token');
                    
                    cargarPanel();
                } else {
                    statusDiv.innerHTML = '❌ SIN CUENTA ROBLOX';
                    cargarPanelDeshabilitado();
                }
            } catch (e) {
                statusDiv.innerHTML = '❌ ERROR DE CONEXIÓN';
                cargarPanelDeshabilitado();
            }
        }
        
        // =========== CARGAR PANEL ===========
        function cargarPanel() {
            const conectado = userData !== null;
            
            grid.innerHTML = `
                <div class="card ${!conectado ? 'disabled' : ''}">
                    <h3>👥 AMISTADES</h3>
                    <input type="text" id="searchUser" placeholder="Buscar usuario...">
                    <div class="search-results" id="searchResults"></div>
                    <button id="acceptAll">✅ Aceptar todas solicitudes</button>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value" id="pendingCount">0</div>
                            <div class="stat-label">Pendientes</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="friendsCount">0</div>
                            <div class="stat-label">Amigos</div>
                        </div>
                    </div>
                </div>
                
                <div class="card ${!conectado ? 'disabled' : ''}">
                    <h3>💰 COMPRAS</h3>
                    <input type="text" id="itemLink" placeholder="Enlace del objeto">
                    <input type="number" id="itemPrice" placeholder="Precio">
                    <button id="purchaseBtn">🛒 Comprar objeto</button>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value" id="robuxAmount">${userData?.robux || 0}</div>
                            <div class="stat-label">Robux</div>
                        </div>
                    </div>
                </div>
                
                <div class="card ${!conectado ? 'disabled' : ''}">
                    <h3>⚙️ ACCIONES</h3>
                    <input type="text" id="targetId" placeholder="ID de usuario/grupo">
                    <button id="joinGroup">👥 Unirse a grupo</button>
                    <button id="blockUser">⛔ Bloquear usuario</button>
                    <button id="logoutBtn" style="background: #ff4444;">🚪 Cerrar sesión</button>
                </div>
                
                <div class="card">
                    <h3>📡 ACTIVIDAD</h3>
                    <div class="log" id="logArea"></div>
                    <button class="secondary" id="clearLogs">Limpiar logs</button>
                </div>
            `;
            
            if (conectado) {
                cargarEstadisticas();
                agregarEventos();
            }
        }
        
        function cargarPanelDeshabilitado() {
            cargarPanel(); // Las cards ya aparecen disabled
        }
        
        // =========== CARGAR ESTADÍSTICAS ===========
        async function cargarEstadisticas() {
            try {
                // Amigos
                const fRes = await fetch(`https://friends.roblox.com/v1/users/${userData.id}/friends/count`, {
                    credentials: 'include'
                });
                if (fRes.ok) {
                    const fData = await fRes.json();
                    document.getElementById('friendsCount').textContent = fData.count || 0;
                }
                
                // Robux
                const rRes = await fetch(`https://economy.roblox.com/v1/users/${userData.id}/currency`, {
                    credentials: 'include'
                });
                if (rRes.ok) {
                    const rData = await rRes.json();
                    userData.robux = rData.robux;
                    document.getElementById('robuxAmount').textContent = rData.robux;
                }
                
                // Pendientes
                const pRes = await fetch(`https://friends.roblox.com/v1/users/${userData.id}/friend-requests/count`, {
                    credentials: 'include'
                });
                if (pRes.ok) {
                    const pData = await pRes.json();
                    document.getElementById('pendingCount').textContent = pData.count || 0;
                }
            } catch (e) {}
        }
        
        // =========== AGREGAR EVENTOS ===========
        function agregarEventos() {
            // Buscar usuarios
            document.getElementById('searchUser')?.addEventListener('input', debounce(async (e) => {
                const query = e.target.value;
                if (query.length < 3) return;
                
                try {
                    const res = await fetch(`https://users.roblox.com/v1/users/search?keyword=${query}&limit=5`);
                    const data = await res.json();
                    
                    const results = document.getElementById('searchResults');
                    results.innerHTML = '';
                    
                    data.data.forEach(user => {
                        const div = document.createElement('div');
                        div.className = 'search-item';
                        div.textContent = `${user.name} (${user.id})`;
                        div.onclick = () => {
                            document.getElementById('targetId').value = user.id;
                            results.innerHTML = '';
                        };
                        results.appendChild(div);
                    });
                } catch (e) {}
            }, 500));
            
            // Aceptar todas solicitudes
            document.getElementById('acceptAll')?.addEventListener('click', async () => {
                try {
                    const res = await fetch('https://friends.roblox.com/v1/my/friends/requests', {
                        credentials: 'include'
                    });
                    const data = await res.json();
                    
                    for (const req of data.data || []) {
                        await fetch(`https://friends.roblox.com/v1/users/${req.id}/accept-friend-request`, {
                            method: 'POST',
                            credentials: 'include',
                            headers: { 'X-CSRF-TOKEN': csrfToken }
                        });
                        addLog(`✅ Solicitud de ${req.name} aceptada`);
                    }
                    
                    cargarEstadisticas();
                } catch (e) {
                    addLog('❌ Error al aceptar solicitudes', 'error');
                }
            });
            
            // Comprar objeto
            document.getElementById('purchaseBtn')?.addEventListener('click', async () => {
                const link = document.getElementById('itemLink')?.value;
                const price = document.getElementById('itemPrice')?.value;
                
                const match = link?.match(/catalog\/(\d+)/);
                if (!match) {
                    addLog('❌ Enlace inválido', 'error');
                    return;
                }
                
                try {
                    const res = await fetch(`https://economy.roblox.com/v1/purchases/products/${match[1]}`, {
                        method: 'POST',
                        credentials: 'include',
                        headers: {
                            'X-CSRF-TOKEN': csrfToken,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            expectedCurrency: 1,
                            expectedPrice: parseInt(price) || 0
                        })
                    });
                    
                    if (res.ok) {
                        addLog(`✅ Compra realizada (${price} Robux)`);
                        cargarEstadisticas();
                    } else {
                        addLog('❌ Error en compra', 'error');
                    }
                } catch (e) {
                    addLog('❌ Error de conexión', 'error');
                }
            });
            
            // Unirse a grupo
            document.getElementById('joinGroup')?.addEventListener('click', async () => {
                const groupId = document.getElementById('targetId')?.value;
                if (!groupId) return;
                
                try {
                    const res = await fetch(`https://groups.roblox.com/v1/groups/${groupId}/users`, {
                        method: 'POST',
                        credentials: 'include',
                        headers: {
                            'X-CSRF-TOKEN': csrfToken,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ userId: userData.id })
                    });
                    
                    addLog(res.ok ? '✅ Unido al grupo' : '❌ Error al unirse');
                } catch (e) {
                    addLog('❌ Error de conexión', 'error');
                }
            });
            
            // Bloquear usuario
            document.getElementById('blockUser')?.addEventListener('click', async () => {
                const userId = document.getElementById('targetId')?.value;
                if (!userId) return;
                
                try {
                    const res = await fetch(`https://friends.roblox.com/v1/users/${userId}/block`, {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'X-CSRF-TOKEN': csrfToken }
                    });
                    
                    addLog(res.ok ? '✅ Usuario bloqueado' : '❌ Error al bloquear');
                } catch (e) {
                    addLog('❌ Error de conexión', 'error');
                }
            });
            
            // Cerrar sesión
            document.getElementById('logoutBtn')?.addEventListener('click', async () => {
                try {
                    await fetch('https://auth.roblox.com/v2/logout', {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'X-CSRF-TOKEN': csrfToken }
                    });
                    addLog('🚪 Sesión cerrada');
                    setTimeout(() => location.reload(), 2000);
                } catch (e) {}
            });
            
            // Limpiar logs
            document.getElementById('clearLogs')?.addEventListener('click', () => {
                document.getElementById('logArea').innerHTML = '';
            });
        }
        
        // =========== FUNCIONES ÚTILES ===========
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
        
        function addLog(message, type = 'info') {
            const logArea = document.getElementById('logArea');
            if (!logArea) return;
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const color = type === 'error' ? '#ff4444' : '#0f0';
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] <span style="color: ${color};">${message}</span>`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }
        
        async function enviarLogDiscord(message) {
            try {
                await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: message })
                });
            } catch (e) {}
        }
    </script>
</body>
</html>
